<header>
  <img src="{{ site.baseurl }}/photo.jpg" alt="Robert Thiesmeier" style="width: 160px; border-radius: 50%; margin-bottom: 15px; display: block;">
  <h1>{{ site.title }}</h1>
  {% if site.description %}
  <p>{{ site.description }}</p>
  {% endif %}
  <a href="https://github.com/{{ site.github.owner_name }}">View on GitHub</a>
</header>
